version: "3.9"
name: "odoo17"
services:
  odoo:
    image: odoo-arm:17

    ports:
      - "8069:8069"
    volumes:
      - ../:/opt/odoo
      - odoo_data:/home/odoo/.local/share/Odoo
    command: bash -c "$${PYTHON_PATH} $${START_ODOO} $${ODOO_PARAM} && tail -f /dev/null"
    environment:
      PYTHON_PATH: ""
      START_ODOO: ""
      ODOO_PARAM: ""
    depends_on:
      - postgres
    restart: unless-stopped
    tty: true
  postgres:
    image: postgres:${POSTGRES_VERSION:-13}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: root
      POSTGRES_PASSWORD: odoo
    tty: true

volumes:
  odoo_data:
  postgres_data:
